<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- ── SEO básico ──────────────────────────────────────── -->
    <title>ELYON Group — Segurança, Automação e Sonorização Residencial</title>
    <meta name="description" content="A ELYON Group projeta e instala sistemas integrados de segurança (CFTV), automação residencial, sonorização ambiente, conectividade e controle de acesso. Do planejamento à entrega, com suporte contínuo." />
    <meta name="keywords" content="automação residencial, segurança eletrônica, CFTV, câmeras de segurança, sonorização ambiente, controle de acesso, alarme residencial, rede Wi-Fi, casa inteligente, smart home, ELYON Group" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ELYON Group" />
    <link rel="canonical" href="https://elyongroup.com.br/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────── -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://elyongroup.com.br/" />
    <meta property="og:site_name"    content="ELYON Group" />
    <meta property="og:title"        content="ELYON Group — Segurança, Automação e Sonorização Residencial" />
    <meta property="og:description"  content="Projetos integrados de segurança, automação, sonorização e conectividade para residências e comércios premium. Engenheiros certificados, suporte pós-instalação incluso." />
    <meta property="og:image"        content="https://elyongroup.com.br/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="ELYON Group — Tecnologia Integrada para Ambientes Premium" />
    <meta property="og:locale"       content="pt_BR" />

    <!-- ── Twitter / X Card ───────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ELYON Group — Segurança, Automação e Sonorização" />
    <meta name="twitter:description" content="Sistemas integrados de segurança, automação residencial e sonorização para ambientes premium. Do planejamento à entrega." />
    <meta name="twitter:image"       content="https://elyongroup.com.br/og-image.jpg" />

    <!-- ── Dados estruturados JSON-LD (LocalBusiness) ─────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "ELYON Group",
      "description": "Empresa especializada em tecnologia integrada: segurança eletrônica, CFTV, automação residencial, sonorização ambiente, conectividade e controle de acesso.",
      "url": "https://elyongroup.com.br",
      "logo": "https://elyongroup.com.br/favicon.svg",
      "image": "https://elyongroup.com.br/og-image.jpg",
      "email": "contato@elyongroup.com.br",
      "priceRange": "$$",
      "currenciesAccepted": "BRL",
      "paymentAccepted": "Cash, Credit Card, Bank Transfer",
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Soluções ELYON Group",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Segurança & CFTV", "description": "Câmeras 4K, gravação em nuvem, alertas inteligentes e monitoramento remoto 24h." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Automação Residencial", "description": "Controle de iluminação, climatização, cortinas e portões integrados em um app." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Sonorização Ambiente", "description": "Áudio distribuído multi-zona com integração a plataformas de streaming." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Conectividade & Redes", "description": "Infraestrutura Wi-Fi 6, fibra óptica, VLAN e cobertura total." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Controle de Acesso", "description": "Portões automáticos, fechaduras digitais, interfones IP e biometria." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Alarme & Detecção", "description": "Sensores de movimento, fumaça e gás com alertas por app e SMS." } }
        ]
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
